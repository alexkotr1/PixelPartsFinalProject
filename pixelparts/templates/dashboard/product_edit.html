{% extends 'dashboard/base.html' %}
{% load static %}

{% block extra_css %}
    <link href="{% static 'css/dashboard/product_edit.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
    {% include 'partials/dashboard/sidebar.html' %}
    <section class="dashboard-content">
        <h2>Edit Product</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <label for="id_name">Name</label>
            <input type="text" name="name" id="id_name" value="{{ product.name }}" required>

            <label for="id_brand">Brand</label>
            <input type="text" name="brand" id="id_brand" value="{{ product.brand }}" required>

            <label for="id_category">Category</label>
            <select name="category" id="id_category">
                {% for cat in categories %}
                    <option value="{{ cat.pk }}" {% if cat.pk == product.category.pk %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>

            <label for="id_price">Price</label>
            <input type="number" name="price" id="id_price" value="{{ product.price }}" step="1.00" required>

            <label for="id_stock">Stock</label>
            <input type="number" name="stock" id="id_stock" value="{{ product.stock }}" required>

            <label for="id_description">Description</label>
            <textarea name="description" id="id_description">{{ product.description }}</textarea>

            <label for="id_featured">
                <input type="checkbox" name="featured" id="id_featured" {% if product.featured %}checked{% endif %}>
                Featured
            </label>

           <label for="id_image">Image</label>
            {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}" class="current-image">
                    <label for="id_delete_image">
                        <input type="checkbox" name="delete_image" id="id_delete_image">
                        Delete current image
                    </label>
            {% endif %}
            <input type="file" name="image" id="id_image" accept="image/*">

            <button type="submit">Save</button>
            <a href="{% url 'dashboard:products' %}">Cancel</a>
        </form>
    </section>
{% endblock %}
